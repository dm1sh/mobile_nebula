# This workflow builds the iOS and Android apps, just to check they build without error

name: Smoke build
on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, labeled, reopened]

jobs:
  build-android:
    name: Android
    runs-on: macos-26
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #6.0.2
        with:
          show-progress: false

      # TODO: remove when https://go-review.googlesource.com/c/go/+/692935 lands in mainline go
      - name: Patch Go
        uses: DefinedNet/patch-go@c8e4a17c75eb242d34c212419d7d3d25e8d58949
        with:
          patch-ref: '296be05a97eb526dc0e438b7387670d4cae4a935'

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 #v5.2.0
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: "gradle"

      - name: Install flutter
        uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e #v2.21.0
        with:
          flutter-version: '3.41.4'
          cache: true

      - name: install dependencies
        env:
          TOKEN: ${{ secrets.MACHINE_USER_PAT }}
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init
          flutter pub get
          touch env.sh

      - name: flutter test
        run: |
          ./gen-artifacts.sh skip
          flutter test

      - name: Build Android debug
        run: flutter build apk --debug

      - name: Collect debug apk
        if: github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'release-check')
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f #6.0.0
        with:
          name: MobileNebulaDebug.apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 5
