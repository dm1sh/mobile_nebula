name: Create release
on:
  workflow_dispatch:
  push:
    tags:
      # Only builds for tags with a meaningless build number suffix: v1.0.0-1
      - "v[0-9]+.[0-9]+.[0-9]+-*"

jobs:
  build:
    name: Build android package
    runs-on: macos-26

    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #6.0.2
        with:
          show-progress: false

      # TODO: remove when https://go-review.googlesource.com/c/go/+/692935 lands in mainline go
      - name: Patch Go
        uses: DefinedNet/patch-go@c8e4a17c75eb242d34c212419d7d3d25e8d58949
        with:
          patch-ref: '296be05a97eb526dc0e438b7387670d4cae4a935'

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 #v5.2.0
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: "gradle"

      - name: Install flutter
        uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e #v2.21.0
        with:
          flutter-version: '3.41.4'
          cache: true

      - name: Get build name and number, install dependencies
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

          flutter pub get

          touch env.sh

          cd android
          echo "BUILD_NUMBER=${GITHUB_RUN_NUMBER}" >> $GITHUB_ENV
          BUILD_NAME="${GITHUB_REF#refs/tags/v}" # strip the front refs/tags/v off
          BUILD_NAME="${BUILD_NAME%-*}" # strip the junk build number off
          echo "BUILD_NAME=$BUILD_NAME" >> $GITHUB_ENV

      - name: flutter test
        run: |
          ./gen-artifacts.sh skip
          flutter test

      - name: Decode and verify release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
        run: |
          # Decode: strip any accidental whitespace/newlines from the secret first
          echo "$KEYSTORE_BASE64" | tr -d '\n\r ' | base64 -d > /tmp/release.keystore
          # Verify the keystore is readable and the key alias exists
          keytool -list -keystore /tmp/release.keystore \
            -storepass "$RELEASE_KEYSTORE_PASSWORD" \
            -alias "$RELEASE_KEY_ALIAS"
          echo "RELEASE_KEYSTORE_PATH=/tmp/release.keystore" >> $GITHUB_ENV

      - name: Build Android
        env:
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          flutter build apk --release --build-number="$BUILD_NUMBER" --build-name="$BUILD_NAME"

      - name: Collect Android artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f #6.0.0
        with:
          name: MobileNebula.apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 5

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          name: Release ${{ github.ref }}
          draft: true
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            build/app/outputs/flutter-apk/app-release.apk
